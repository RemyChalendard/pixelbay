<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Codes de Jeux de PixelBay</title>
    <style>
        .container {
            width: 300px;
            height: 100px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div class="container" id="displayContainer"></div>

<script>
    let conteneur = document.getElementById("displayContainer");
    let jeux = ""; // J'ai rajouter cette partie car sinon le code marchais pas
    let numeroDuJeu = prompt("Entrez le numéro du jeu (1, 2, 3 ou 4):");

    if (numeroDuJeu == 1) {
        jeux = "Space Adventure";
    } else if (numeroDuJeu == 2) {
        jeux = "Castle Quest";
    } else if (numeroDuJeu == 3) {
        jeux = "Mystery Island";
    } else if (numeroDuJeu == 4) {
        jeux = "Robot Wars";
    } else {
        jeux = "Numéro de jeu invalide.";
    }

    console.log(jeux);      
    alert("Vous avez choisi : " + jeux);  
    conteneur.textContent = jeux;         
</script>
</body>

</html>
