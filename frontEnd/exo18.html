<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Calendrier PixelBay</title>
    <style>
        .calendar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .month {
            border: 2px solid #333;
            padding: 15px;
            border-radius: 8px;
            background: #f0f0f0;

        }

        .month h3 {
            margin-top: 0;
            color: #d9534f;
        }

        .h2 {
            font-weight: bold;
            font-size:12px;

        }


        .month p {
            font-size: 14px;
            color: #000000;
        }

    </style>
</head>

<body>
    <h1>Calendrier Promotionnel PixelBay</h1>

    <div id="calendar" class="calendar"></div>

    <script>
        let mois = "";
        let jeux = "";
        let description = "";

        const calendarData = [
            { mois: "Janvier", jeux: "Zelda", description: "Sauvez la princesse Zelda" },
            { mois: "Fevrier", jeux: "Mario Kart", description: "Faite la course et remporté la victoire" },
            { mois: "Mars", jeux: "WWE", description: "Combatter et remporter le titre de champion !" },
            { mois: "Avril", jeux: "Flight Simulator", description: "Voyager dans le monde entier !" },
            { mois: "Mai", jeux: "Fifa", description: "Jouer avec plus de 7000 équipes et remporter la victoire !" },
            { mois: "Juin", jeux: "Formula One", description: "Foncé vers la victoire !" },
            { mois: "Juillet", jeux: "Animal Crossing", description: "Crée votre ile de reve" },
            { mois: "Aout", jeux: "Hitman", description: "Incarner l'agent 47" },
            { mois: "Septembre", jeux: "GTA 6", description: "Bienvenue a Vice City !" },
            { mois: "Octobre", jeux: "Mario Party", description: " Jouer entre amis à Mario Party !" },
            { mois: "Novembre", jeux: "Yoshi Island", description: " Découvrez les mysteres de Yoshi Island " },
            { mois: "Decembre", jeux: "Pokemon", description: "Devenez le meilleur dresseur !" },
        ]


        // Dom coté html/visiteur
        calendarData.forEach(element => {
            const article = document.createElement("div");
            article.classList.add("month")
            article.innerHTML = `<h3 class=""> ${element.mois} </h3>
            <p> <h2>${element.jeux}</h2> </p> 
            <p> ${element.description} </p>`
            document.getElementById("calendar").appendChild(article);
            console.log(calendarData);
        });

    </script>
</body>

</html>
