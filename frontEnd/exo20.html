<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Barre de Progression de Scroll chez PixelBay</title>
    <style>
        body {
            height: 300vh;
            /* Pour permettre le scroll */
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 5px;
            background-color: #ff0000;
            width: 0%;
        }
    </style>
</head>

<body>
    <h1>Faites défiler la page pour voir la barre de progression</h1>

    <footer></footer>

    <script>
        const barre = document.querySelector("footer") // Selectionne le footer

        window.addEventListener("scroll", function () { // Evenement qui ce declanche a chaque scroll
            let position = window.scrollY; // Le scroll prend place sur l'axe Y
            console.log(position)
            let hauteur = document.documentElement.scrollHeight - window.innerHeight;
            console.log(hauteur)
            let pourcentage = (position / hauteur) * 100; // Le scroll ne peut pas depasser 100%, cela correspond a la fin de la page
            console.log(pourcentage)
            barre.style.width = pourcentage + "%"; // Le pourcentage du dessus s'applique donc au footer
        })
    </script>
</body>

</html>
