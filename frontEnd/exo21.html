<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Simulation de Commande</title>
    <style>
        .result {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }

        .result.active {
            color: green;
        }
    </style>
</head>

<body>
    <h1>Calculateur de Panier PixelBay</h1>
    <form>
        <div>
            <label for="quantity">Quantité</label>
            <input id="quantity" type="number" min="1"  value="1">
        </div>
        <div>
            <label for="unitPrice">Prix Unitaire HT</label>
            <input id="unitPrice" type="text" value="49.99" disabled>
        </div>
        <div>
            <label for="tax">TVA %</label>
            <input id="tax" type="text" value="20" disabled>
        </div>
        <div>
            <label for="totalPrice">PRICE : </label>
            <input id="totalPrice" type="text" value="" disabled>
        </div>
        <div>
            <button type="submit">Recalculer le panier</button>
        </div>
    </form>
    <div class="result"></div>

    <script>
        // Votre code JavaScript ici

        let form = document.querySelector("form");
        console.log("form", form)
        let quantity = parseFloat(document.querySelector("#quantity").value);
        console.log("quantity", quantity)
        let unitPrice = parseFloat(document.querySelector("#unitPrice").value);
        console.log("unitPrice", unitPrice)
        let tax = parseFloat(document.querySelector("#tax").value);
        console.log("tax",tax);
        
        let button = document.querySelector("#button");
        console.log("buuton", button);
        
        let totalPrice = document.querySelector("#totalPrice");
        console.log("totalPrice",totalPrice)

        totalPrice.value = ((( unitPrice * tax) / 100) + unitPrice)* quantity;

        form.addEventListener("change", (event) => {
            console.log(event.target.value) // event.target c'est l'element qui est manipulé
            event.preventDefault();
            totalPrice.value = ((( unitPrice * tax) / 100) + unitPrice)* parseInt(event.target.value);
        })

    </script>
</body>

</html>
